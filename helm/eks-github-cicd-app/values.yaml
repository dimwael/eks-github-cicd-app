replicaCount: 2

image:
  repository: 649976227195.dkr.ecr.us-east-1.amazonaws.com/eks-github-cicd-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5
  failureThreshold: 3

serviceAccount:
  create: true
  annotations: {}

nameOverride: ""
fullnameOverride: ""
