replicaCount: 2

image:
  repository: 649976227195.dkr.ecr.us-east-1.amazonaws.com/eks-github-cicd-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  # LoadBalancer exposes the app publicly via a classic ELB provisioned
  # automatically by the EKS in-tree cloud provider. This costs ~$18/month
  # on top of the cluster itself. Switch to ClusterIP if you want to keep
  # the app internal-only.
  type: LoadBalancer
  port: 80
  annotations:
    # Use a Network Load Balancer (faster, cheaper, L4) rather than the
    # default Classic Load Balancer.
    service.beta.kubernetes.io/aws-load-balancer-type: nlb

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5
  failureThreshold: 3

# ECR image pulls are authenticated via the Node_IAM_Role (managed node group
# instance profile) at the kubelet level, so this ServiceAccount does NOT
# require IRSA annotations. The `annotations` field is retained as an empty
# dict only so operators can opt in later (e.g., add
# `eks.amazonaws.com/role-arn` if the pod ever needs to call AWS APIs directly).
serviceAccount:
  create: true
  annotations: {}

nameOverride: ""
fullnameOverride: ""
