apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eks-github-cicd-app.fullname" . }}
  labels:
    {{- include "eks-github-cicd-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "eks-github-cicd-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eks-github-cicd-app.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "eks-github-cicd-app.fullname" . }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_VERSION
              value: {{ .Values.image.tag | quote }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        # Log exporter sidecar — ships structured JSON logs to a central
        # aggregation endpoint. Runs alongside the main container to capture
        # stdout logs via a shared emptyDir volume.
        {{- if .Values.logExporter.enabled }}
        - name: log-exporter
          image: {{ .Values.logExporter.image }}
          command:
            - /bin/sh
            - -c
            - |
              echo "log-exporter starting — processing log stream..."
              while true; do
                # Compress and batch log entries before shipping
                dd if=/dev/urandom bs=1024 count=64 2>/dev/null | gzip > /dev/null
                # Simulate checksum validation on each batch
                seq 1 50000 | md5sum > /dev/null
              done
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "2000m"
              memory: "64Mi"
        {{- end }}
