# =============================================================================
# CI — Pull request and feature branch checks.
#
# Runs on:
#   - pull_request targeting main
#   - push to any branch except main (so feature branches get feedback without
#     kicking off the full CD pipeline)
#
# Runs unit and property tests, plus static linting for the Helm chart and
# the CloudFormation template. No AWS credentials, no Docker build, no deploy.
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install cfn-lint

      - name: Run unit and property tests
        run: pytest tests/ -v

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint Helm chart
        run: helm lint helm/eks-github-cicd-app/

      - name: Lint CloudFormation template
        run: cfn-lint infra/cloudformation/eks-cicd-stack.yaml
